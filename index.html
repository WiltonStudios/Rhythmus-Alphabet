<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rhythmic Alphabet</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fff;
      color: #111;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }

    h1 {
      font-size: 20px;
      margin: 0;
    }

    .layout {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 1100px;
      width: 100%;
    }

    .palette {
      border: 1px solid #ddd;
      padding: 12px;
      border-radius: 8px;
      min-width: 260px;
    }

    .palette-title {
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: 600;
      text-align: center;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .card {
      border-radius: 6px;
      border: 1px solid #ccc;
      background: #fafafa;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      user-select: none;
      position: relative;
      overflow: hidden;
      touch-action: none;
    }

    .card.dragging {
      opacity: 0.5;
    }

    .touch-drag-ghost {
      border-radius: 6px;
      border: 1px solid #999;
      background: #fff;
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      pointer-events: none;
      position: fixed;
      transform: translate(-50%, -50%);
      z-index: 1000;
    }

    .touch-drag-ghost img {
      max-width: 100%;
      max-height: 100%;
      display: block;
    }

    body.touch-dragging {
      overflow: hidden;
      user-select: none;
    }

    .card img {
      max-width: 100%;
      max-height: 100%;
      display: block;
    }

    .card-label {
      position: absolute;
      bottom: 2px;
      right: 4px;
      font-size: 11px;
      background: rgba(255,255,255,0.8);
      padding: 1px 4px;
      border-radius: 3px;
    }

    .canvas-wrapper {
      flex: 1;
      min-width: 360px;
    }

    .canvas-title {
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: 600;
      text-align: center;
    }

    /* --- BLINKENDER METRONOM-PUNKT --- */
    #metronomeLED {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #aaa;
      margin: 0 auto 10px auto;
      transition: background 0.08s ease;
    }

    .led-on {
      background: #ff3b30 !important;
    }

    .bars {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #fcfcfc;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 140px repeat(4, 1fr);
      gap: 8px;
      align-items: center;
    }

    .bar-heading {
      align-items: center;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .bar-label {
      font-size: 12px;
      text-align: right;
      padding-right: 4px;
      color: #555;
    }

    .slot {
      border-radius: 6px;
      border: 1px dashed #bbb;
      background: #fff;
      height: 80px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #aaa;
      overflow: hidden;
    }

    .slot.occupied {
      border-style: solid;
      color: #000;
    }

    .slot.drag-over {
      border-color: #111;
      background: #f0f0f0;
    }

    .slot .slot-letter {
      position: absolute;
      top: 2px;
      left: 4px;
      font-size: 11px;
      color: #777;
      background: rgba(255,255,255,0.8);
      padding: 0 3px;
      border-radius: 3px;
    }

    .slot img {
      max-height: 100%;
      max-width: 100%;
    }

    .buttons-row {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      padding: 6px 10px;
      font-size: 13px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: #f7f7f7;
      cursor: pointer;
    }

    button:hover {
      background: #eee;
    }

    #bpmInput {
      width: 60px;
      padding: 4px;
      font-size: 13px;
    }

    audio {
      display: none;
    }

    @media (max-width: 720px) {
      body {
        padding: 10px;
        gap: 10px;
        align-items: stretch;
      }

      h1 {
        font-size: 18px;
        text-align: center;
      }

      .layout {
        display: block;
        max-width: none;
      }

      .palette,
      .canvas-wrapper {
        box-sizing: border-box;
        min-width: 0;
        width: 100%;
      }

      .palette {
        margin-bottom: 12px;
        padding: 10px;
      }

      .palette-title,
      .canvas-title {
        font-size: 13px;
      }

      .card-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
      }

      .card {
        height: 58px;
      }

      .bars {
        padding: 10px;
        gap: 12px;
      }

      .bar-row {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
      }

      .bar-heading {
        grid-column: 1 / -1;
        justify-content: space-between;
      }

      .bar-label {
        padding-right: 0;
        text-align: left;
        font-weight: 600;
      }

      .row-play-btn {
        min-height: 32px;
      }

      .slot {
        height: 62px;
      }

      .slot .slot-letter {
        font-size: 10px;
      }

      .buttons-row {
        justify-content: stretch;
      }

      .buttons-row button {
        flex: 1 1 30%;
        min-height: 36px;
      }

      .buttons-row label {
        align-items: center;
        display: flex;
        gap: 4px;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <h1>Rhythmic Alphabet</h1>

  <div class="layout">
    <!-- Palette -->
    <div class="palette">
      <div class="palette-title">Buchstaben (drag&drop)</div>
      <div class="card-grid" id="cardGrid"></div>
    </div>

    <!-- Canvas -->
    <div class="canvas-wrapper">
      <div class="canvas-title">4 Rhythmen</div>

      <!-- BLINKENDE METRONOM-LED -->
      <div id="metronomeLED"></div>

      <div class="bars" id="bars">
        <div class="bar-row" data-bar="1">
          <div class="bar-heading">
            <div class="bar-label">Rhythmus 1</div>
            <button class="row-play-btn" type="button" data-bar="1">Play</button>
          </div>
          <div class="slot" data-slot="1"></div>
          <div class="slot" data-slot="2"></div>
          <div class="slot" data-slot="3"></div>
          <div class="slot" data-slot="4"></div>
        </div>
        <div class="bar-row" data-bar="2">
          <div class="bar-heading">
            <div class="bar-label">Rhythmus 2</div>
            <button class="row-play-btn" type="button" data-bar="2">Play</button>
          </div>
          <div class="slot" data-slot="5"></div>
          <div class="slot" data-slot="6"></div>
          <div class="slot" data-slot="7"></div>
          <div class="slot" data-slot="8"></div>
        </div>
        <div class="bar-row" data-bar="3">
          <div class="bar-heading">
            <div class="bar-label">Rhythmus 3</div>
            <button class="row-play-btn" type="button" data-bar="3">Play</button>
          </div>
          <div class="slot" data-slot="9"></div>
          <div class="slot" data-slot="10"></div>
          <div class="slot" data-slot="11"></div>
          <div class="slot" data-slot="12"></div>
        </div>
        <div class="bar-row" data-bar="4">
          <div class="bar-heading">
            <div class="bar-label">Rhythmus 4</div>
            <button class="row-play-btn" type="button" data-bar="4">Play</button>
          </div>
          <div class="slot" data-slot="13"></div>
          <div class="slot" data-slot="14"></div>
          <div class="slot" data-slot="15"></div>
          <div class="slot" data-slot="16"></div>
        </div>
      </div>

      <div class="buttons-row">
        <button id="clearBtn">Clear</button>

        <label>
          BPM:
          <input id="bpmInput" type="number" value="66" min="30" max="200">
        </label>

        <button id="metronomeBtn">Metronome</button>
        <button id="playBtn">Play</button>
        <button id="stopBtn">Stop</button>
        <button id="midiBtn">Download MIDI</button>
      </div>

    </div>
  </div>

  <small>© Dominik Geyr 2025</small>

  <!-- Audio samples -->
  <audio id="metronomeSound" src="Metronom_click.wav" preload="auto"></audio>
  <audio id="bellSound" src="bell.wav" preload="auto"></audio>

  <script>
    // -----------------------
    // CONFIG: letters + images
    // -----------------------
    const LETTER_IDS = [
      'A','B','C','D','E','F','G','H',
      'I','J','K','L','M','N','O','P'
    ];

    function imageForLetter(letterId) {
      return `${letterId}.png`;
    }

    // state: which letter is in which slot (1..16) or null
    const slotsState = Array(16).fill(null);

    // -----------------------
    // Build palette
    // -----------------------
    const cardGrid = document.getElementById('cardGrid');

    LETTER_IDS.forEach(id => {
      const card = document.createElement('div');
      card.className = 'card';
      card.setAttribute('draggable', 'true');
      card.dataset.letter = id;

      const img = document.createElement('img');
      img.src = imageForLetter(id);
      img.alt = id;
      card.appendChild(img);

      const label = document.createElement('div');
      label.className = 'card-label';
      label.textContent = id;
      card.appendChild(label);

      card.addEventListener('dragstart', e => {
        card.classList.add('dragging');
        e.dataTransfer.setData('text/plain', id);
      });

      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
      });

      card.addEventListener('pointerdown', e => {
        if (e.pointerType === 'mouse') return;
        startTouchDrag(e, card, id);
      });

      cardGrid.appendChild(card);
    });

    // -----------------------
    // Canvas slots – drag/drop
    // -----------------------
    const barsElement = document.getElementById('bars');
    const slotElements = Array.from(barsElement.querySelectorAll('.slot'));

    slotElements.forEach(slot => {
      slot.addEventListener('dragover', e => {
        e.preventDefault();
        slot.classList.add('drag-over');
      });

      slot.addEventListener('dragleave', () => {
        slot.classList.remove('drag-over');
      });

      slot.addEventListener('drop', e => {
        e.preventDefault();
        slot.classList.remove('drag-over');
        const letterId = e.dataTransfer.getData('text/plain');
        if (!LETTER_IDS.includes(letterId)) return;

        const index = parseInt(slot.dataset.slot, 10) - 1;
        slotsState[index] = letterId;
        renderSlots();
      });
    });

    let touchDrag = null;

    function startTouchDrag(e, card, letterId) {
      e.preventDefault();
      stopTouchDrag();

      const rect = card.getBoundingClientRect();
      const ghost = card.cloneNode(true);
      ghost.classList.add('touch-drag-ghost');
      ghost.classList.remove('dragging');
      ghost.removeAttribute('draggable');
      ghost.style.width = `${rect.width}px`;
      ghost.style.height = `${rect.height}px`;
      document.body.appendChild(ghost);

      touchDrag = {
        pointerId: e.pointerId,
        letterId,
        sourceCard: card,
        ghost,
        overSlot: null
      };

      card.classList.add('dragging');
      document.body.classList.add('touch-dragging');
      moveTouchDrag(e.clientX, e.clientY);

      window.addEventListener('pointermove', handleTouchDragMove, { passive: false });
      window.addEventListener('pointerup', handleTouchDragEnd, { passive: false });
      window.addEventListener('pointercancel', handleTouchDragCancel, { passive: false });
    }

    function handleTouchDragMove(e) {
      if (!touchDrag || e.pointerId !== touchDrag.pointerId) return;
      e.preventDefault();
      moveTouchDrag(e.clientX, e.clientY);
    }

    function handleTouchDragEnd(e) {
      if (!touchDrag || e.pointerId !== touchDrag.pointerId) return;
      e.preventDefault();
      const targetSlot = getSlotAtPoint(e.clientX, e.clientY);
      if (targetSlot) {
        const index = parseInt(targetSlot.dataset.slot, 10) - 1;
        slotsState[index] = touchDrag.letterId;
        renderSlots();
      }
      stopTouchDrag();
    }

    function handleTouchDragCancel(e) {
      if (!touchDrag || e.pointerId !== touchDrag.pointerId) return;
      e.preventDefault();
      stopTouchDrag();
    }

    function moveTouchDrag(clientX, clientY) {
      if (!touchDrag) return;
      touchDrag.ghost.style.left = `${clientX}px`;
      touchDrag.ghost.style.top = `${clientY}px`;

      const nextSlot = getSlotAtPoint(clientX, clientY);
      if (nextSlot === touchDrag.overSlot) return;
      if (touchDrag.overSlot) {
        touchDrag.overSlot.classList.remove('drag-over');
      }
      touchDrag.overSlot = nextSlot;
      if (touchDrag.overSlot) {
        touchDrag.overSlot.classList.add('drag-over');
      }
    }

    function getSlotAtPoint(clientX, clientY) {
      const element = document.elementFromPoint(clientX, clientY);
      return element ? element.closest('.slot') : null;
    }

    function stopTouchDrag() {
      if (!touchDrag) return;
      if (touchDrag.overSlot) {
        touchDrag.overSlot.classList.remove('drag-over');
      }
      touchDrag.sourceCard.classList.remove('dragging');
      touchDrag.ghost.remove();
      touchDrag = null;

      document.body.classList.remove('touch-dragging');
      window.removeEventListener('pointermove', handleTouchDragMove);
      window.removeEventListener('pointerup', handleTouchDragEnd);
      window.removeEventListener('pointercancel', handleTouchDragCancel);
    }

    function renderSlots() {
      slotElements.forEach(slot => {
        const index = parseInt(slot.dataset.slot, 10) - 1;
        const letter = slotsState[index];

        slot.innerHTML = '';
        slot.classList.remove('occupied');

        if (!letter) return;

        slot.classList.add('occupied');

        const label = document.createElement('div');
        label.className = 'slot-letter';
        const beatInBar = (index % 4) + 1;
        label.textContent = `Beat ${beatInBar} – ${letter}`;
        slot.appendChild(label);

        const img = document.createElement('img');
        img.src = imageForLetter(letter);
        img.alt = letter;
        slot.appendChild(img);
      });
    }

    // -----------------------
    // Letter rhythm definitions (A–P)
    // -----------------------
    // Tokens: N16, R16, N8, R8, N8., R8., N4, R4
    const RAW_LETTERS = [
      { id: 'A', pattern: ['N4'] },
      { id: 'B', pattern: ['R16','N8.'] },
      { id: 'C', pattern: ['R8','N8'] },
      { id: 'D', pattern: ['R8.','N16'] },
      { id: 'E', pattern: ['N16','N8.'] },
      { id: 'F', pattern: ['R16','N16','N8'] },
      { id: 'G', pattern: ['R8','N16','N16'] },
      { id: 'H', pattern: ['N8.','N16'] },
      { id: 'I', pattern: ['N8','N8'] },
      { id: 'J', pattern: ['R16','N8','N16'] },
      { id: 'K', pattern: ['N16','N16','N8'] },
      { id: 'L', pattern: ['R16','N16','N16','N16'] },
      { id: 'M', pattern: ['N8','N16','N16'] },
      { id: 'N', pattern: ['N16','N8','N16'] },
      { id: 'O', pattern: ['N16','N16','N16','N16'] },
      { id: 'P', pattern: ['R4'] }
    ];

    function parseToken(token) {
      const dotted = token.endsWith('.');
      const base = dotted ? token.slice(0, -1) : token;
      const isNote = base[0] === 'N';
      const kind = base.slice(1); // "4","8","16"
      let dur16 = 0;
      if (kind === '16') dur16 = 1;
      else if (kind === '8') dur16 = 2;
      else if (kind === '4') dur16 = 4;
      if (dotted) {
        dur16 = dur16 + dur16 / 2; // e.g. 8th (2) -> 3
      }
      return { isNote, dur16 };
    }

    const LETTER_MAP = {};
    RAW_LETTERS.forEach(raw => {
      const segments = raw.pattern.map(parseToken);
      const total = segments.reduce((a,s) => a + s.dur16, 0);
      if (total !== 4) {
        console.warn('Letter', raw.id, 'does not sum to one beat (4 sixteenths). Got:', total);
      }
      LETTER_MAP[raw.id] = { id: raw.id, segments };
    });

    function buildSegmentsFromSlots() {
      const segments = [];
      slotsState.forEach(letterId => {
        if (!letterId || !LETTER_MAP[letterId]) {
          // empty beat -> quarter rest
          segments.push({ isNote: false, dur16: 4 });
        } else {
          LETTER_MAP[letterId].segments.forEach(s => {
            segments.push({ isNote: s.isNote, dur16: s.dur16 });
          });
        }
      });
      return segments;
    }

    function buildSegmentsFromBar(barNumber) {
      const startIndex = (barNumber - 1) * 4;
      const segments = [];
      slotsState.slice(startIndex, startIndex + 4).forEach(letterId => {
        if (!letterId || !LETTER_MAP[letterId]) {
          segments.push({ isNote: false, dur16: 4 });
        } else {
          LETTER_MAP[letterId].segments.forEach(s => {
            segments.push({ isNote: s.isNote, dur16: s.dur16 });
          });
        }
      });
      return segments;
    }

    // -----------------------
    // Buttons: Clear
    // -----------------------
    document.getElementById('clearBtn').addEventListener('click', () => {
      for (let i = 0; i < slotsState.length; i++) {
        slotsState[i] = null;
      }
      renderSlots();
    });

    // -----------------------
    // Playback using samples
    // -----------------------
    const metronomeSample = document.getElementById('metronomeSound');
    const bellSample = document.getElementById('bellSound');

    let playbackTimeouts = [];
    let activeSamples = [];
    let metronomeInterval = null;

    const led = document.getElementById('metronomeLED');

    function flashLED() {
      if (!led) return;
      led.classList.add('led-on');
      setTimeout(() => led.classList.remove('led-on'), 80);
    }

    function playSample(sampleEl, flash = false) {
      const clone = sampleEl.cloneNode();
      clone.currentTime = 0;
      clone.play();
      activeSamples.push(clone);
      clone.addEventListener('ended', () => {
        activeSamples = activeSamples.filter(a => a !== clone);
      });
      if (flash) {
        flashLED();
      }
    }

    function stopPlayback() {
      playbackTimeouts.forEach(id => clearTimeout(id));
      playbackTimeouts = [];

      activeSamples.forEach(s => {
        try {
          s.pause();
          s.currentTime = 0;
        } catch (e) {}
      });
      activeSamples = [];
    }

    function stopMetronome() {
      if (metronomeInterval) {
        clearInterval(metronomeInterval);
        metronomeInterval = null;
      }
    }

    // -----------------------
    // Endlos-Metronom
    // -----------------------
    function startMetronome() {
      stopPlayback();
      stopMetronome();

      let bpm = parseFloat(document.getElementById('bpmInput').value);
      if (!bpm || bpm <= 0) bpm = 66;

      const ms = 60000 / bpm;

      // sofortiger Klick + Blink
      playSample(metronomeSample, true);

      metronomeInterval = setInterval(() => {
        playSample(metronomeSample, true);
      }, ms);
    }

    document.getElementById('metronomeBtn').addEventListener('click', () => {
      startMetronome();
    });

    // -----------------------
    // Play: Rhythmus + Metronom mit einem Einzähltakt
    // -----------------------
    function playSegmentsWithCountIn(segments) {
      if (!segments.length) return;

      stopPlayback();
      stopMetronome(); // separates Metronom anhalten

      let bpm = parseFloat(document.getElementById('bpmInput').value);
      if (!bpm || bpm <= 0) bpm = 66;

      const quarterMs = 60000 / bpm;
      const sixteenthMs = quarterMs / 4;
      const countInQuarters = 4;

      const totalSixteenths = segments.reduce((a, s) => a + s.dur16, 0);
      const totalQuarters = totalSixteenths / 4;

      const startTime = performance.now() + 200; // kleiner Delay
      const rhythmStartTime = startTime + countInQuarters * quarterMs;

      // Einzähltakt + Metronom während des Rhythmus
      for (let q = 0; q < countInQuarters + totalQuarters; q++) {
        const when = startTime + q * quarterMs;
        const delay = when - performance.now();
        if (delay >= 0) {
          const id = setTimeout(() => playSample(metronomeSample, true), delay);
          playbackTimeouts.push(id);
        }
      }

      // Rhythmus-Glocke
      let cursorSixteenth = 0;
      segments.forEach(seg => {
        if (seg.isNote) {
          const when = rhythmStartTime + cursorSixteenth * sixteenthMs;
          const delay = when - performance.now();
          if (delay >= 0) {
            const id = setTimeout(() => playSample(bellSample, false), delay);
            playbackTimeouts.push(id);
          }
        }
        cursorSixteenth += seg.dur16;
      });
    }

    document.getElementById('playBtn').addEventListener('click', () => {
      playSegmentsWithCountIn(buildSegmentsFromSlots());
    });

    document.querySelectorAll('.row-play-btn').forEach(button => {
      button.addEventListener('click', () => {
        const barNumber = parseInt(button.dataset.bar, 10);
        playSegmentsWithCountIn(buildSegmentsFromBar(barNumber));
      });
    });

    // -----------------------
    // Stop: alles aus
    // -----------------------
    document.getElementById('stopBtn').addEventListener('click', () => {
      stopPlayback();
      stopMetronome();
    });

    // -----------------------
    // MIDI export (uses BPM input)
    // -----------------------
    document.getElementById('midiBtn').addEventListener('click', () => {
      const segments = buildSegmentsFromSlots();
      if (!segments.length) return;

      let bpm = parseFloat(document.getElementById('bpmInput').value);
      if (!bpm || bpm <= 0) bpm = 66;

      const blob = createMidiBlob(segments, bpm);
      if (!blob) return;

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `rhythmic_alphabet_4bars_${Math.round(bpm)}bpm.mid`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    function createMidiBlob(segments, bpm) {
      const ticksPerQuarter = 480;
      const ticksPerSixteenth = ticksPerQuarter / 4;
      const tempo = Math.round(60000000 / bpm); // microseconds per quarter

      const events = [];
      let currentTick = 0;
      const midiNote = 36; // C2

      segments.forEach(seg => {
        const segTicks = seg.dur16 * ticksPerSixteenth;
        if (seg.isNote) {
          events.push({ tick: currentTick, type: 'on', note: midiNote, vel: 100 });
          events.push({ tick: currentTick + segTicks, type: 'off', note: midiNote, vel: 0 });
        }
        currentTick += segTicks;
      });

      events.sort((a, b) => a.tick - b.tick);

      const trackBytes = [];

      function writeVarLen(value) {
        let buffer = value & 0x7F;
        const bytes = [];
        while ((value >>= 7)) {
          buffer <<= 8;
          buffer |= ((value & 0x7F) | 0x80);
        }
        while (true) {
          bytes.push(buffer & 0xFF);
          if (buffer & 0x80) {
            buffer >>= 8;
          } else {
            break;
          }
        }
        for (let b of bytes) trackBytes.push(b);
      }

      // Tempo event
      trackBytes.push(
        0x00, 0xFF, 0x51, 0x03,
        (tempo >> 16) & 0xFF,
        (tempo >> 8) & 0xFF,
        tempo & 0xFF
      );

      let lastTick = 0;
      events.forEach(ev => {
        const delta = ev.tick - lastTick;
        writeVarLen(delta);
        lastTick = ev.tick;
        if (ev.type === 'on') {
          trackBytes.push(0x90, ev.note, ev.vel); // note on, channel 1
        } else {
          trackBytes.push(0x80, ev.note, ev.vel); // note off
        }
      });

      // End of track
      trackBytes.push(0x00, 0xFF, 0x2F, 0x00);

      // Header chunk
      const header = [];
      header.push(0x4d, 0x54, 0x68, 0x64); // 'MThd'
      header.push(0x00, 0x00, 0x00, 0x06); // length
      header.push(0x00, 0x00);             // format 0
      header.push(0x00, 0x01);             // 1 track
      header.push((ticksPerQuarter >> 8) & 0xFF, ticksPerQuarter & 0xFF);

      // Track header
      const trackHeader = [];
      const trackLen = trackBytes.length;
      trackHeader.push(0x4d, 0x54, 0x72, 0x6b); // 'MTrk'
      trackHeader.push(
        (trackLen >> 24) & 0xFF,
        (trackLen >> 16) & 0xFF,
        (trackLen >> 8) & 0xFF,
        trackLen & 0xFF
      );

      const allBytes = new Uint8Array([...header, ...trackHeader, ...trackBytes]);
      return new Blob([allBytes], { type: 'audio/midi' });
    }

    // initial render
    renderSlots();
  </script>
</body>
</html>
